name: deu_karten
description: A German language learning mobile app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Navigation
  go_router: ^14.6.1

  # State Management
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5
  riverpod_annotation: ^2.6.1

  # UI & Animations
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  intl: ^0.19.0

  # Voice & Speech
  speech_to_text: 7.0.0
  flutter_tts: ^4.0.2
  permission_handler: ^11.3.0

  # Web TTS
  web: ^1.1.0

  # Local Storage
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.1
  path: ^1.8.3
  uuid: ^4.3.3
  shared_preferences: ^2.2.2

  # Sharing
  share_plus: ^12.0.1
  file_picker: ^8.0.0+3

  # Icons
  cupertino_icons: ^1.0.8

  # Utilities
  language_code: ^0.4.0

  # Code Generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Firebase (сумісні з Xcode 15.2)
  firebase_core: 3.8.0
  firebase_auth: 5.3.3
  cloud_firestore: 5.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  analyzer: ^6.4.1
  build_runner: ^2.4.13
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  drift_dev: ^2.14.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"