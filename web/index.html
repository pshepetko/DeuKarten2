<body>
  <!-- Load local sql.js (sql-wasm) so Drift's WebDatabase can access the JavaScript/sql.wasm runtime.
       Place the files under web/sqljs/ so the JS can locate the wasm file at runtime. -->
  <script src="sqljs/sql-wasm.js"></script>
  <!-- Initialize sql.js early with an explicit locateFile so the WASM is loaded from the correct local path. -->
  <script>
    // If sql-wasm.js loaded correctly it exposes initSqlJs. Call it once with a moduleConfig
    // that ensures the wasm is resolved from /sqljs/sql-wasm.wasm. Drift's WebDatabase will
    // reuse the same initialized module / promise when it calls initSqlJs later.
    try {
      if (typeof initSqlJs === 'function') {
        // Start loading async (do not await here) so wasm is available by the time Flutter bootstraps.
        initSqlJs({
          locateFile: function(path) {
            // Always resolve to the local web/sqljs folder. This avoids document.currentScript based resolution
            // which can return the wrong path (and in some hosting setups return an HTML page instead of the WASM).
            return '/sqljs/' + path;
          }
        });
      }
    } catch (e) {
      console.warn('sql.js init failed early:', e);
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
